name: crypto-scan

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jalankan scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scan.js

      - name: Simpan state (dedup)
        run: |
          git config user.name  "scanner-bot"
          git config user.email "scanner-bot@users.noreply.github.com"
          git add state.json
          git commit -m "update state [skip ci]" || echo "tidak ada perubahan"
          git push || echo "push gagal"
